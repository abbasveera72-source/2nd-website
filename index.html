<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        header {
            padding: 40px;
            background: #1e293b;
        }

        .profile {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
        }

        .section {
            padding: 40px;
        }

        .blog-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .blog {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            width: 250px;
        }

        .blog img {
            width: 100%;
            border-radius: 10px;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #38bdf8;
            color: black;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #0ea5e9;
        }
    </style>
</head>

<body>

<header>
    <img src="ab.png" class="profile" alt="Profile Image">
    <h1>Abbas</h1>
    <p>Web Developer</p>
</header>

<section class="section">
    <h2>My Blogs</h2>

    <div class="blog-container">

        <!-- BLOG 1 -->
        <div class="blog">
            <img src="ab.png" alt="Blog 1">
            <h3>Blog 1</h3>
            <p>This is my first blog.</p>
            <a href="blog1.html" class="btn">Read More</a>
        </div>

        <!-- BLOG 2 -->
        <div class="blog">
            <img src="ac.png" alt="Blog 2">
            <h3>Blog 2</h3>
            <p>This is my second blog.</p>
            <a href="blog2.html" class="btn">Read More</a>
        </div>

    </div>
</section>

</body>
</html>
