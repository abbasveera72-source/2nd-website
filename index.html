<!DOCTYPE html>
<html>
<head>
    <title>Abbas Tech Blog</title>

    <style>
        body {
            background:#0f172a;
            color:white;
            font-family:Arial;
            text-align:center;
            padding:20px;
        }

        h2 { margin-top:10px; }

        .profile img {
            width:80px;
            height:80px;
            border-radius:50%;
        }

        .article {
            background:#1e293b;
            margin:20px auto;
            padding:15px;
            border-radius:10px;
            width:90%;
            max-width:500px;
        }

        .article img {
            width:100%;
            border-radius:10px;
        }

        #fullArticle {
            display:none;
            background:#334155;
            padding:20px;
            margin-bottom:20px;
            border-radius:10px;
        }

        input, textarea {
            width:90%;
            margin:5px;
            padding:10px;
            border-radius:5px;
            border:none;
        }

        button {
            padding:8px 15px;
            margin:5px;
            background:skyblue;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .like { background:#ef4444; }
        .close { background:#64748b; }
    </style>
</head>

<body>

<!-- Profile -->
<div class="profile">
    <img src="abbas.jpeg">
    <h2>Abbas Tech Blog 🚀</h2>
</div>

<!-- ADMIN PANEL -->
<h3>Add New Article</h3>
<input id="title" placeholder="Article Title">
<input id="image" placeholder="Image file name (e.g. ac.png)">
<textarea id="content" placeholder="Write your tech article..."></textarea>
<br>
<button onclick="addArticle()">➕ Publish</button>

<!-- FULL ARTICLE VIEW -->
<div id="fullArticle"></div>

<!-- ARTICLES LIST -->
<div id="articles"></div>

<script>
let articles = JSON.parse(localStorage.getItem("articles")) || [];

function saveArticles() {
    localStorage.setItem("articles", JSON.stringify(articles));
}

function addArticle() {
    const title = document.getElementById("title").value;
    const image = document.getElementById("image").value;
    const content = document.getElementById("content").value;

    if (!title || !content) {
        alert("Please fill all fields!");
        return;
    }

    articles.unshift({
        title,
        image,
        content,
        likes: 0,
        comments: []
    });

    saveArticles();
    displayArticles();
}

function displayArticles() {
    const container = document.getElementById("articles");
    container.innerHTML = "";

    articles.forEach((a, index) => {
        container.innerHTML += `
            <div class="article">
                <img src="${a.image}">
                <h3>${a.title}</h3>
                <button onclick="readMore(${index})">Read More</button>
            </div>
        `;
    });
}

function readMore(index) {
    const a = articles[index];

    let commentsHTML = "";
    a.comments.forEach(c => {
        commentsHTML += `<p>💬 ${c}</p>`;
    });

    const content = `
        <h1>${a.title}</h1>
        <p>${a.content}</p>

        <button class="like" onclick="likeArticle(${index})">
            ❤️ Like (${a.likes})
        </button>

        <button class="close" onclick="closeArticle()">❌ Close</button>

        <h3>Comments</h3>
        ${commentsHTML}

        <input id="commentInput" placeholder="Write comment...">
        <button onclick="addComment(${index})">Post</button>
    `;

    const box = document.getElementById("fullArticle");
    box.innerHTML = content;
    box.style.display = "block";

    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function likeArticle(index) {
    articles[index].likes++;
    saveArticles();
    readMore(index);
}

function addComment(index) {
    const input = document.getElementById("commentInput");
    if (input.value.trim() === "") return;

    articles[index].comments.push(input.value);
    input.value = "";

    saveArticles();
    readMore(index);
}

function closeArticle() {
    document.getElementById("fullArticle").style.display = "none";
}

// Initial load
displayArticles();
</script>

</body>
</html>
