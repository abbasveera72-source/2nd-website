<!DOCTYPE html>
<html>
<head>
    <title>Abbas Tech Blog</title>

    <style>
        * {
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', sans-serif;
        }

        body {
            display:flex;
            background:#0f172a;
            color:#e2e8f0;
        }

        /* SIDEBAR */
        .sidebar {
            width:250px;
            background:#020617;
            height:100vh;
            padding:20px;
            position:fixed;
        }

        .sidebar img {
            width:70px;
            border-radius:50%;
            display:block;
            margin:auto;
        }

        .sidebar h2 {
            text-align:center;
            margin:10px 0;
        }

        .sidebar p {
            text-align:center;
            font-size:14px;
            color:#94a3b8;
        }

        /* MAIN */
        .main {
            margin-left:250px;
            padding:20px;
            width:100%;
        }

        /* ADMIN PANEL */
        .admin {
            background:#1e293b;
            padding:20px;
            border-radius:12px;
            margin-bottom:20px;
        }

        input, textarea {
            width:100%;
            padding:10px;
            margin:8px 0;
            border:none;
            border-radius:8px;
            background:#0f172a;
            color:white;
        }

        button {
            padding:10px 15px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        .publish { background:#38bdf8; color:black; }

        /* ARTICLE GRID */
        .articles {
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
            gap:20px;
        }

        .card {
            background:#1e293b;
            border-radius:12px;
            overflow:hidden;
            transition:0.3s;
        }

        .card:hover {
            transform:scale(1.03);
        }

        .card img {
            width:100%;
            height:180px;
            object-fit:cover;
        }

        .card-body {
            padding:15px;
        }

        .read {
            background:#22c55e;
            color:white;
            margin-top:10px;
        }

        /* FULL ARTICLE */
        #fullArticle {
            display:none;
            background:#020617;
            padding:25px;
            border-radius:12px;
            margin-bottom:20px;
        }

        .like { background:#ef4444; color:white; }
        .close { background:#64748b; color:white; }

        .comment {
            background:#1e293b;
            padding:8px;
            margin:5px 0;
            border-radius:6px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <img src="abbas.jpeg">
    <h2>Abbas</h2>
    <p>Tech Blogger 🚀</p>
</div>

<!-- MAIN CONTENT -->
<div class="main">

    <!-- ADMIN -->
    <div class="admin">
        <h3>Create Article</h3>
        <input id="title" placeholder="Title">
        <input id="image" placeholder="Image (ac.png)">
        <textarea id="content" placeholder="Write tech article..."></textarea>
        <button class="publish" onclick="addArticle()">Publish</button>
    </div>

    <!-- FULL ARTICLE -->
    <div id="fullArticle"></div>

    <!-- ARTICLES -->
    <div class="articles" id="articles"></div>

</div>

<script>
let articles = JSON.parse(localStorage.getItem("articles")) || [];

function save(){
    localStorage.setItem("articles", JSON.stringify(articles));
}

function addArticle(){
    let t = title.value;
    let i = image.value;
    let c = content.value;

    if(!t || !c) return alert("Fill all fields!");

    articles.unshift({title:t,image:i,content:c,likes:0,comments:[]});
    save();
    display();
}

function display(){
    articles.innerHTML="";
    articles.forEach((a,index)=>{
        articles.innerHTML += `
        <div class="card">
            <img src="${a.image}">
            <div class="card-body">
                <h3>${a.title}</h3>
                <button class="read" onclick="readMore(${index})">Read</button>
            </div>
        </div>`;
    });
}

function readMore(i){
    let a = articles[i];

    let cmts = a.comments.map(c=>`<div class="comment">${c}</div>`).join("");

    fullArticle.innerHTML = `
        <h1>${a.title}</h1>
        <p>${a.content}</p>

        <button class="like" onclick="like(${i})">❤️ ${a.likes}</button>
        <button class="close" onclick="closeArticle()">Close</button>

        <h3>Comments</h3>
        ${cmts}
        <input id="cmt" placeholder="Write comment...">
        <button onclick="addComment(${i})">Post</button>
    `;

    fullArticle.style.display="block";
    window.scrollTo({top:0,behavior:'smooth'});
}

function like(i){
    articles[i].likes++;
    save();
    readMore(i);
}

function addComment(i){
    let val = cmt.value.trim();
    if(!val) return;

    articles[i].comments.push(val);
    cmt.value="";
    save();
    readMore(i);
}

function closeArticle(){
    fullArticle.style.display="none";
}

display();
</script>

</body>
</html>
