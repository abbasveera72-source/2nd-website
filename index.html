<!DOCTYPE html>
<html>
<head>
    <title>Abbas Tech Blog</title>

    <style>
        body {
            background:#0f172a;
            color:white;
            font-family:Arial;
            text-align:center;
            padding:20px;
        }

        .profile img {
            width:80px;
            height:80px;
            border-radius:50%;
        }

        .article {
            background:#1e293b;
            margin:20px auto;
            padding:15px;
            border-radius:10px;
            width:90%;
            max-width:500px;
        }

        .article img {
            width:100%;
            border-radius:10px;
        }

        #fullArticle {
            display:none;
            background:#334155;
            padding:20px;
            margin-bottom:20px;
            border-radius:10px;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {opacity:0; transform:translateY(-20px);}
            to {opacity:1; transform:translateY(0);}
        }

        button {
            padding:8px 15px;
            margin:5px;
            background:skyblue;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .like {
            background:#ef4444;
            color:white;
        }

        .close {
            background:#64748b;
        }

        textarea {
            width:90%;
            margin-top:10px;
            padding:10px;
            border-radius:5px;
            border:none;
        }
    </style>
</head>

<body>

<!-- Full Article -->
<div id="fullArticle"></div>

<!-- Profile -->
<div class="profile">
    <img src="abbas.jpeg">
    <h2>Abbas Tech Blog</h2>
</div>

<!-- Blog 1 -->
<div class="article">
    <img src="ac.png">
    <p>Artificial Intelligence is changing the future...</p>
    <button onclick="readMore('blog1')">Read More</button>
</div>

<!-- Blog 2 -->
<div class="article">
    <img src="ab.png">
    <p>Web development is evolving rapidly in 2025...</p>
    <button onclick="readMore('blog2')">Read More</button>
</div>

<script>
let likes = 0;

function readMore(blog) {

    let content = "";

    if (blog === "blog1") {
        content = `
            <h1>🚀 The Rise of Artificial Intelligence</h1>
            <p>
            Artificial Intelligence (AI) is transforming the way we live and work. 
            From smart assistants to self-driving cars, AI is everywhere.
            </p>

            <p>
            In 2025, AI is being used in healthcare, education, and business automation. 
            Tools like ChatGPT and machine learning models are helping people solve problems faster.
            </p>

            <p>
            The future of AI looks even more powerful, with innovations in robotics, 
            data analysis, and human-computer interaction.
            </p>
        `;
    }

    if (blog === "blog2") {
        content = `
            <h1>💻 Modern Web Development in 2025</h1>
            <p>
            Web development has evolved significantly with new frameworks and technologies.
            Developers now use tools like React, Tailwind CSS, and Node.js to build fast and responsive websites.
            </p>

            <p>
            Frontend development focuses on user experience, while backend systems handle data and logic.
            Full-stack developers combine both skills to create complete applications.
            </p>

            <p>
            The future includes AI-powered websites, faster performance, and better security practices.
            </p>
        `;
    }

    content += `
        <br>
        <button class="like" onclick="addLike()">❤️ Like (<span id="likeCount">${likes}</span>)</button>
        <button class="close" onclick="closeArticle()">❌ Close</button>

        <h3>Comments</h3>
        <textarea placeholder="Write a comment..."></textarea>
    `;

    const box = document.getElementById("fullArticle");
    box.innerHTML = content;
    box.style.display = "block";

    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function addLike() {
    likes++;
    document.getElementById("likeCount").innerText = likes;
}

function closeArticle() {
    document.getElementById("fullArticle").style.display = "none";
}
</script>

</body>
</html>
