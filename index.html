<!DOCTYPE html>
<html>
<head>
    <title>Abbas Tech Blog</title>

    <style>
        body {
            margin:0;
            font-family: 'Segoe UI', sans-serif;
            background:#0f172a;
            color:#e2e8f0;
        }

        header {
            background:#020617;
            padding:20px;
            text-align:center;
            border-bottom:1px solid #1e293b;
        }

        header img {
            width:70px;
            border-radius:50%;
        }

        h1 { margin:10px 0 5px; }
        h3 { margin-top:30px; }

        .container {
            max-width:900px;
            margin:auto;
            padding:20px;
        }

        .admin {
            background:#1e293b;
            padding:20px;
            border-radius:12px;
            margin-bottom:30px;
        }

        input, textarea {
            width:100%;
            padding:10px;
            margin:8px 0;
            border-radius:8px;
            border:none;
            outline:none;
            background:#0f172a;
            color:white;
        }

        button {
            padding:10px 16px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        .publish {
            background:#38bdf8;
            color:black;
        }

        .article {
            background:#1e293b;
            margin-bottom:20px;
            border-radius:12px;
            overflow:hidden;
            transition:0.3s;
        }

        .article:hover {
            transform:translateY(-5px);
        }

        .article img {
            width:100%;
            height:200px;
            object-fit:cover;
        }

        .article-content {
            padding:15px;
        }

        .read-btn {
            background:#22c55e;
            color:white;
        }

        #fullArticle {
            display:none;
            background:#020617;
            padding:25px;
            border-radius:12px;
            margin-bottom:20px;
        }

        .like { background:#ef4444; color:white; }
        .close { background:#64748b; color:white; }

        .comment-box {
            margin-top:15px;
        }

        .comment {
            background:#1e293b;
            padding:8px;
            margin:5px 0;
            border-radius:6px;
        }
    </style>
</head>

<body>

<header>
    <img src="abbas.jpeg">
    <h1>Abbas Tech Blog</h1>
    <p>Latest in Technology 🚀</p>
</header>

<div class="container">

    <!-- ADMIN PANEL -->
    <div class="admin">
        <h3>Publish Article</h3>
        <input id="title" placeholder="Article Title">
        <input id="image" placeholder="Image (e.g. ac.png)">
        <textarea id="content" rows="4" placeholder="Write your article..."></textarea>
        <button class="publish" onclick="addArticle()">Publish</button>
    </div>

    <!-- FULL ARTICLE -->
    <div id="fullArticle"></div>

    <!-- ARTICLES -->
    <div id="articles"></div>

</div>

<script>
let articles = JSON.parse(localStorage.getItem("articles")) || [];

function save() {
    localStorage.setItem("articles", JSON.stringify(articles));
}

function addArticle() {
    const title = titleInput.value;
    const image = imageInput.value;
    const content = contentInput.value;

    if (!title || !content) return alert("Fill all fields!");

    articles.unshift({
        title, image, content,
        likes:0,
        comments:[]
    });

    save();
    display();
}

function display() {
    articlesDiv.innerHTML = "";

    articles.forEach((a,i)=>{
        articlesDiv.innerHTML += `
        <div class="article">
            <img src="${a.image}">
            <div class="article-content">
                <h2>${a.title}</h2>
                <button class="read-btn" onclick="readMore(${i})">Read More</button>
            </div>
        </div>`;
    });
}

function readMore(i){
    let a = articles[i];

    let comments = a.comments.map(c=>`<div class="comment">${c}</div>`).join("");

    fullArticle.innerHTML = `
        <h1>${a.title}</h1>
        <p>${a.content}</p>

        <button class="like" onclick="like(${i})">❤️ ${a.likes}</button>
        <button class="close" onclick="closeArticle()">Close</button>

        <div class="comment-box">
            <h3>Comments</h3>
            ${comments}
            <input id="cmt" placeholder="Write comment...">
            <button onclick="addComment(${i})">Post</button>
        </div>
    `;

    fullArticle.style.display="block";
    window.scrollTo({top:0, behavior:'smooth'});
}

function like(i){
    articles[i].likes++;
    save();
    readMore(i);
}

function addComment(i){
    let val = cmt.value.trim();
    if(!val) return;

    articles[i].comments.push(val);
    cmt.value="";
    save();
    readMore(i);
}

function closeArticle(){
    fullArticle.style.display="none";
}

display();
</script>

</body>
</html>
