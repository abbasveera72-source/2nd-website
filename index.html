<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M. Abbas | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #020617;
    --card: rgba(15,23,42,0.7);
    --blue: #38bdf8;
    --purple: #818cf8;
    --text: #e2e8f0;
    --dim: #94a3b8;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 20px;
}

/* ✅ FIXED PROFILE IMAGE */
.profile {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    border: 3px solid var(--blue);
    object-fit: cover;
    box-shadow: 0 0 40px var(--blue);
    display: block;
    margin: auto;
}

/* NAME */
h1 {
    font-size: 3rem;
    margin-top: 20px;
    color: #60a5fa;
}

/* TEXT */
.subtitle {
    color: var(--dim);
    margin-top: 10px;
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* CARD */
.section {
    background: var(--card);
    margin: 20px 0;
    padding: 30px;
    border-radius: 20px;
}

/* BLOG IMAGE */
.blog-img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 12px;
    margin: 15px 0;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 10px 20px;
    border: 1px solid var(--blue);
    color: var(--blue);
    text-decoration: none;
    border-radius: 8px;
}

.btn:hover {
    background: var(--blue);
    color: black;
}

.footer {
    text-align: center;
    color: var(--dim);
    margin-top: 30px;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

    <!-- 🔴 IMPORTANT: MATCH THIS NAME EXACTLY -->
    <img src="abbas.jpeg" class="profile" alt="profile">

    <h1>M. ABBAS</h1>
    <p class="subtitle">Computer Engineering Student | IoT • Embedded • SQL</p>

</section>

<div class="container">

<!-- BLOG 1 -->
<div class="section">
    <h2>🚀 Edge Intelligence</h2>

    <!-- BLOG IMAGE -->
    <img src="ab.png" class="blog-img">

    <p class="subtitle">
        Building real-time IoT pipelines with MySQL & edge systems.
    </p>

    <!-- WORKING BUTTON -->
    <a href="blog1.html" class="btn">Read More</a>
</div>

<!-- BLOG 2 -->
<div class="section">
    <h2>📊 SQL Optimization</h2>

    <img src="ac.png" class="blog-img">

    <p class="subtitle">
        Advanced techniques to improve database performance.
    </p>

    <a href="blog2.html" class="btn">Read More</a>
</div>

</div>

<div class="footer">
    © 2026 M. Abbas
</div>

</body>
</html>
